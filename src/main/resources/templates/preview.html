<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    EJS original: <title><%= form.name %> — FormCraft</title>
    Thymeleaf:    th:text sets the text content of the element
  -->
  <title th:text="${form.name} + ' — FormCraft'">Form — FormCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/preview.css}">
</head>
<body class="bg-light">
  <div class="preview-page py-5 px-3">
    <div class="text-center mb-4">
      <span class="formcraft-badge mb-2">FORMCRAFT</span>
      <!--
        EJS original: <h1 class="h3 fw-semibold mb-0"><%= form.name %></h1>
        Thymeleaf:    th:text safely escapes and sets the text content
      -->
      <h1 class="h3 fw-semibold mb-0" th:text="${form.name}">Untitled Form</h1>
    </div>
    <div id="formContainer" class="d-flex justify-content-center"></div>
    <div class="success-msg text-center mt-4 mx-auto p-4 bg-white border rounded shadow-sm"
         id="successMsg" style="display:none;max-width:480px;">
      <div class="success-icon mb-2 mx-auto rounded-circle d-flex align-items-center justify-content-center"
           style="width:52px;height:52px;background:rgba(22,168,107,0.15);color:#16a86b;font-size:22px;">✓</div>
      <h2 class="h5 fw-semibold mb-1">Form Submitted!</h2>
      <p class="text-muted mb-0 small">Thank you for your response.</p>
    </div>
  </div>

  <!--
    EJS original: <script> const schema = <%- JSON.stringify(form.schema) %>; </script>
    <%- ... %> outputs raw/unescaped content (no HTML encoding).
    Thymeleaf equivalent: th:inline="javascript" + [(${...})] for raw inline output.
    The schemaJson attribute is pre-serialized by the controller as a JSON string.
  -->
  <script th:inline="javascript">
    const schema = /*[[${schemaJson}]]*/ [];
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>
  <script th:src="@{/js/renderer.js}"></script>
</body>
</html>
