# Server port (matches Node.js default of 3000; change to 8080 for Spring convention)
server.port=3000

# Application name
spring.application.name=FormCraft

# Thymeleaf settings
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Disable favicon 404 noise in logs
spring.mvc.favicon.enabled=false

# Pretty-print JSON responses (optional, helpful for debugging)
spring.jackson.serialization.indent-output=false

# Logging
logging.level.com.formcraft=DEBUG
